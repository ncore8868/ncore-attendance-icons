<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>N-CORE 현장 출퇴근</title>

  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="N-CORE 출퇴근">
  <meta name="format-detection" content="telephone=no">

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <style>
    :root {
      --black:#111111;
      --panel:#1b1b1d;
      --orange:#ff7900;
      --white:#ffffff;
      --muted:#a8a8ad;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body {
      margin:0;
      min-height:100%;
      background:var(--black);
      color:var(--white);
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Segoe UI",sans-serif;
    }
    body {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:calc(24px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
    }
    .wrap {
      width:min(100%,420px);
      text-align:center;
    }
    .brand-logo {
      display:block;
      width:min(310px, 76vw);
      height:auto;
      object-fit:contain;
      margin:18px auto 6px;
    }
    .sr-only {
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }
    .icon {
      width:132px;
      height:132px;
      border-radius:29px;
      box-shadow:0 18px 48px rgba(0,0,0,.45);
    }
    h1 {
      margin:22px 0 8px;
      font-size:27px;
      letter-spacing:-1px;
    }
    .sub {
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }
    .card {
      margin-top:26px;
      padding:20px;
      border:1px solid #303034;
      border-radius:20px;
      background:var(--panel);
      text-align:left;
    }
    .card strong {
      display:block;
      margin-bottom:12px;
      font-size:15px;
    }
    .step {
      display:flex;
      gap:10px;
      margin:9px 0;
      color:#d7d7da;
      font-size:14px;
      line-height:1.5;
    }
    .num {
      flex:none;
      width:23px;
      height:23px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:var(--orange);
      color:#fff;
      font-size:12px;
      font-weight:900;
    }
    .button {
      width:100%;
      min-height:58px;
      margin-top:15px;
      border:0;
      border-radius:15px;
      background:var(--orange);
      color:#fff;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
    }
    .launching {
      display:none;
      margin-top:25px;
      color:var(--muted);
      font-size:14px;
    }
    .spinner {
      width:32px;
      height:32px;
      margin:0 auto 13px;
      border:4px solid #38383c;
      border-top-color:var(--orange);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    .note {
      margin-top:15px;
      color:#7f7f84;
      font-size:11px;
      line-height:1.5;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="icon" src="./icon-512.png" alt="N-CORE 출퇴근 아이콘">
    <img class="brand-logo" src="./ncore-logo.png" alt="N-CORE 로고">
    <h1 class="sr-only">N-CORE 현장 출퇴근</h1>
    <p class="sub">홈 화면에 추가한 뒤 아이콘으로 실행해 주세요.</p>

    <section id="installPanel" class="card">
      <strong>휴대전화 설치 방법</strong>
      <div class="step">
        <span class="num">1</span>
        <span><b>아이폰</b>: Safari 공유 버튼 → 홈 화면에 추가</span>
      </div>
      <div class="step">
        <span class="num">2</span>
        <span><b>갤럭시</b>: Chrome ⋮ → 홈 화면에 추가 또는 앱 설치</span>
      </div>
      <div class="step">
        <span class="num">3</span>
        <span>홈 화면에 생긴 N-CORE 아이콘으로 다시 실행</span>
      </div>

      <button class="button" type="button" onclick="openAttendanceApp()">
        설치 없이 출퇴근 앱 열기
      </button>
    </section>

    <section id="launchingPanel" class="launching">
      <div class="spinner"></div>
      출퇴근 앱을 여는 중입니다.
    </section>

    <p class="note">출퇴근 기록과 현장 사진은 기존 회사 구글시트와 구글드라이브에 저장됩니다.</p>
  </main>

  <script>
    const ATTENDANCE_APP_URL = "https://script.google.com/macros/s/AKfycbxBxDbj0hBwruoN4_0mTajPshXbkWuSCUt34lP5rHKuVVpUA7kuSrJ5w5zG1FUD_5Fw/exec";

    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches ||
             window.navigator.standalone === true;
    }

    function openAttendanceApp() {
      document.getElementById('installPanel').style.display = 'none';
      document.getElementById('launchingPanel').style.display = 'block';
      window.location.replace(ATTENDANCE_APP_URL);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }

    // 홈 화면 아이콘으로 실행했을 때만 자동으로 실제 출퇴근 앱을 연다.
    if (isStandalone()) {
      document.getElementById('installPanel').style.display = 'none';
      document.getElementById('launchingPanel').style.display = 'block';
      setTimeout(openAttendanceApp, 450);
    }
  </script>
</body>
</html>
